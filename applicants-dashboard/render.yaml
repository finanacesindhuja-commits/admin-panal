services:
  - type: web
    name: admin-panel-backend
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install && cd ../frontend && npm install && npm run build
    startCommand: NODE_ENV=production node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: VITE_HR_API_URL
        value: https://hr-attendance-dx3c.onrender.com
